name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update README with exact version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          sed -i "s/semantic-memory-mcp@[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*/semantic-memory-mcp@${VERSION}/g" README.md
          sed -i "s/semantic-memory-mcp@latest/semantic-memory-mcp@${VERSION}/g" README.md
          if git diff --quiet README.md; then
            echo "README already up to date"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "Update README commands to v${VERSION}"
            git push origin HEAD:main
          fi
